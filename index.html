<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sneha 💖</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #fcb69f);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  .container {
    padding: 20px;
    margin-top: 50px;
  }

  h1 {
    font-size: 35px;
    color: white;
  }

  #timer {
    font-size: 22px;
    margin: 20px;
    color: white;
  }

  #message {
    font-size: 24px;
    color: white;
    margin-top: 20px;
  }

  .photo-container {
    position: relative;
    display: inline-block;
  }

  .photo-container img {
    width: 220px;
    border-radius: 15px;
  }

  /* Birthday cap */
  .cap {
    position: absolute;
    width: 100px;
    top: -40px;
    left: 60px;
    transform: rotate(-15deg);
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
  }

  @keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
  }

</style>
</head>

<body>

<div class="container">

  <h1>🎂 Happy Birthday Sneha 💕</h1>

  <div id="timer"></div>

  <div class="photo-container">
    <!-- YOUR IMAGE -->
    <img src="image.jpeg" alt="Sneha Photo">

    <!-- Birthday Cap -->
    <img class="cap" src="https://cdn-icons-png.flaticon.com/512/744/744546.png">
  </div>

  <div id="message"></div>
</div>

<!-- Birthday Song -->
<audio id="song" autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>

const message = "🎉 Happy 17th Birthday Sneha Mukherjee! 💖 You are truly special. May your day be filled with endless smiles, love, and beautiful memories. Stay happy always! 💕";

const targetDate = new Date("June 17, 2026 00:00:00").getTime();

const timer = document.getElementById("timer");
const msg = document.getElementById("message");

function updateTimer() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff < 0) {
    timer.style.display = "none";
    startTyping();
    document.getElementById("song").play();
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  timer.innerHTML = `⏳ ${d}d ${h}h ${m}m ${s}s left`;
}

setInterval(updateTimer, 1000);

function startTyping() {
  let i = 0;
  function type() {
    if (i < message.length) {
      msg.innerHTML += message.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }
  type();
}

/* Floating hearts */
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);

</script>

</body>
</html>
